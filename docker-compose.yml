services:
  db:
    image: postgres:16
    container_name: dancemanager-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dancemanager
    ports:
      - '5432:5432'
    volumes:
      - dancemanager-pgdata:/var/lib/postgresql/data

volumes:
  dancemanager-pgdata:
